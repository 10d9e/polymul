name: Score gate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    paths:
      - src/algorithm/**

concurrency:
  group: score-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  score:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Skip bot baseline commits
        id: skip
        run: |
          msg="$(git log -1 --format=%B)"
          if [[ "$msg" == *"[skip ci]"* ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: dtolnay/rust-toolchain@stable
        if: steps.skip.outputs.skip != 'true'
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        if: steps.skip.outputs.skip != 'true'

      - name: PR boundary guard
        if: steps.skip.outputs.skip != 'true' && github.event_name == 'pull_request'
        env:
          GITHUB_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: bash scripts/guard-pr.sh "${{ github.event.pull_request.base.sha }}"

      - name: Detect algorithm changes
        if: steps.skip.outputs.skip != 'true'
        id: algo
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base="${{ github.event.pull_request.base.sha }}"
            if git diff --name-only "$base"...HEAD -- src/algorithm/ | grep -q .; then
              echo "changed=true" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Require beating the record
        if: steps.skip.outputs.skip != 'true' && steps.algo.outputs.changed == 'true'
        env:
          GITHUB_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: bash scripts/ci-score-gate.sh

      - name: Record new best on main
        if: >-
          steps.skip.outputs.skip != 'true' &&
          github.event_name == 'push' &&
          github.ref == 'refs/heads/main' &&
          steps.algo.outputs.changed == 'true'
        run: bash scripts/ci-update-baseline.sh

      - name: Summary
        if: steps.skip.outputs.skip != 'true' && steps.algo.outputs.changed == 'true'
        run: |
          {
            echo "## Score gate passed"
            echo
            if [[ -f /tmp/polymul_eval.out ]]; then
              echo '```'
              tail -n 5 /tmp/polymul_eval.out
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"
